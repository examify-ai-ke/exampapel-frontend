version: '3.8'

services:
  frontend-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://fastapi.localhost/api/v1
      - NEXT_PUBLIC_API_BASE_URL=http://fastapi.localhost
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    restart: unless-stopped
    networks:
      - exampapel-network

networks:
  exampapel-network:
    external: true
